<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Свадебный переводчик FR→RU</title>
<style>
  body{font-family:system-ui,sans-serif;margin:0;padding:16px;background:#111;color:#eee}
  h3{margin:4px 0 12px}
  input{width:100%;box-sizing:border-box;padding:10px;margin:4px 0;border-radius:8px;border:1px solid #444;background:#1c1c1c;color:#eee;font-size:14px}
  button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:10px;font-size:17px;font-weight:600}
  #startBtn{background:#2e7d32;color:#fff}
  #stopBtn{background:#b71c1c;color:#fff;display:none}
  #dlBtn{background:#333;color:#eee;font-size:14px;padding:10px}
  #status{margin:10px 0;font-size:13px;color:#9e9e9e;white-space:pre-line}
  #interim{color:#80cbc4;font-style:italic;min-height:1.4em;font-size:15px}
  .msg{background:#1e1e1e;border-radius:10px;padding:10px;margin:8px 0}
  .fr{color:#9e9e9e;font-size:12px}
  .ru{font-size:16px;margin-top:4px}
  details{margin-bottom:10px}
  summary{cursor:pointer;color:#9e9e9e}
</style>
</head>
<body>
<h3>🎤 Переводчик FR → RU → Telegram</h3>

<details open id="setup">
  <summary>Настройки (сохраняются на телефоне)</summary>
  <input id="oaKey" placeholder="OpenAI API key — НЕОБЯЗАТЕЛЬНО (пусто = бесплатный Google-перевод)" autocomplete="off">
  <input id="tgToken" placeholder="Telegram bot token (123456:ABC...)" autocomplete="off">
  <input id="tgChat" placeholder="Telegram chat id (-100...)" autocomplete="off">
  <button id="testBtn" style="background:#333;color:#eee;font-size:14px;padding:10px">Проверить связь (пришлёт тест в телегу)</button>
</details>

<button id="startBtn">▶ Начать перевод</button>
<button id="stopBtn">■ Остановить</button>
<div id="status">Ожидание…</div>
<div id="interim"></div>
<div id="log"></div>
<button id="dlBtn">⬇ Скачать транскрипт</button>

<script>
const $ = id => document.getElementById(id);
const fields = ["oaKey","tgToken","tgChat"];
fields.forEach(f => {
  $(f).value = localStorage.getItem(f) || "";
  $(f).addEventListener("input", () => localStorage.setItem(f, $(f).value.trim()));
});

let running = false, rec = null, wakeLock = null;
let transcript = [];
let restartCount = 0;

function setStatus(t){ $("status").textContent = t; }

async function requestLock(){
  try {
    wakeLock = await navigator.wakeLock.request("screen");
    // система сама снимает lock при сворачивании — обнуляем, чтобы можно было запросить заново
    wakeLock.addEventListener("release", () => { wakeLock = null; });
  } catch(e){}
}
let awakeHooked = false;
async function keepAwake(){
  await requestLock();
  if(awakeHooked) return;
  awakeHooked = true;
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && running && !wakeLock) requestLock();
  });
}

async function translateFR(text){
  const key = $("oaKey").value.trim();
  if(!key){  // бесплатный вариант: неофициальный эндпоинт Google Translate
    const u = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=fr&tl=ru&dt=t&q=" + encodeURIComponent(text);
    const r = await fetch(u);
    if(!r.ok) throw new Error("GoogleTr " + r.status);
    const j = await r.json();
    return j[0].map(x => x[0]).join("").trim();
  }
  const r = await fetch("https://api.openai.com/v1/chat/completions", {
    method:"POST",
    headers:{ "Content-Type":"application/json",
              "Authorization":"Bearer " + key },
    body: JSON.stringify({
      model:"gpt-4o-mini", temperature:0.2,
      messages:[
        {role:"system", content:"Ты синхронный переводчик на свадьбе во Франции. Переведи фразу с французского на русский естественно и тепло. Выведи ТОЛЬКО перевод."},
        {role:"user", content:text}
      ]
    })
  });
  if(!r.ok) throw new Error("OpenAI " + r.status);
  const j = await r.json();
  return j.choices[0].message.content.trim();
}

async function sendTG(text){
  for(let i=0;i<3;i++){
    try{
      const r = await fetch(`https://api.telegram.org/bot${$("tgToken").value.trim()}/sendMessage`,{
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({chat_id: $("tgChat").value.trim(), text})
      });
      if(r.status === 429){ await new Promise(s=>setTimeout(s,3000)); continue; }
      if(!r.ok) throw new Error("TG " + r.status);
      return true;
    }catch(e){ await new Promise(s=>setTimeout(s,1500)); }
  }
  return false;
}

// очередь, чтобы фразы уходили по порядку
const q = [];
let busy = false;
async function pump(){
  if(busy || !q.length) return;
  busy = true;
  const fr = q.shift();
  try{
    const ru = await translateFR(fr);
    transcript.push({fr, ru});
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<div class="fr"></div><div class="ru"></div>`;
    div.querySelector(".fr").textContent = fr;
    div.querySelector(".ru").textContent = ru;
    $("log").prepend(div);
    const ok = await sendTG(ru);
    if(!ok) div.querySelector(".ru").textContent += "  ⚠️ не ушло в TG";
  }catch(e){
    setStatus("Ошибка перевода: " + e.message + " (продолжаю слушать)");
  }
  busy = false;
  pump();
}

function makeRec(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ alert("Этот браузер не умеет распознавание речи. Открой в Chrome на Android."); return null; }
  const r = new SR();
  r.lang = "fr-FR";
  r.continuous = true;
  r.interimResults = true;

  r.onresult = (e) => {
    let interim = "";
    for(let i = e.resultIndex; i < e.results.length; i++){
      const res = e.results[i];
      if(res.isFinal){
        const text = res[0].transcript.trim();
        if(text.length > 1){ q.push(text); pump(); }
      } else interim += res[0].transcript;
    }
    $("interim").textContent = interim;
  };
  r.onend = () => {           // Chrome на Android периодически сам останавливается — перезапускаем
    if(running){
      restartCount++;
      setStatus(`Слушаю… (перезапусков: ${restartCount})`);
      try{ r.start(); }catch(e){ setTimeout(()=>{ try{r.start()}catch(_){} }, 500); }
    }
  };
  r.onerror = (e) => {
    if(e.error === "not-allowed"){ setStatus("Нет доступа к микрофону! Разреши в настройках сайта."); running = false; }
    // остальные ошибки (no-speech, network) — onend сам перезапустит
  };
  return r;
}

$("startBtn").onclick = async () => {
  if(!$("tgToken").value || !$("tgChat").value){
    alert("Заполни token и chat_id телеги в настройках"); return;
  }
  rec = makeRec();
  if(!rec) return;
  running = true; restartCount = 0;
  await keepAwake();
  rec.start();
  $("setup").open = false;
  $("startBtn").style.display = "none";
  $("stopBtn").style.display = "block";
  setStatus("Слушаю…");
};

$("stopBtn").onclick = () => {
  running = false;
  if(rec) rec.stop();
  if(wakeLock){ wakeLock.release(); wakeLock = null; }
  $("startBtn").style.display = "block";
  $("stopBtn").style.display = "none";
  setStatus("Остановлено.");
};

$("testBtn").onclick = async () => {
  const ok = await sendTG("✅ Тест: переводчик подключён и готов");
  setStatus(ok ? "Тест ушёл в телегу ✅" : "Тест НЕ ушёл — проверь токен и chat_id ❌");
};

$("dlBtn").onclick = () => {
  const txt = transcript.map(t => `FR: ${t.fr}\nRU: ${t.ru}`).join("\n\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([txt], {type:"text/plain"}));
  a.download = "transcript.txt";
  a.click();
};
</script>
</body>
</html>
