<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Свадебный переводчик FR→RU</title>
<style>
  body{font-family:system-ui,sans-serif;margin:0;padding:16px;background:#111;color:#eee}
  h3{margin:4px 0 12px}
  input,select{width:100%;box-sizing:border-box;padding:10px;margin:4px 0;border-radius:8px;border:1px solid #444;background:#1c1c1c;color:#eee;font-size:14px}
  button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:10px;font-size:17px;font-weight:600}
  #startBtn{background:#2e7d32;color:#fff}
  #runRow{display:none;gap:8px}
  #pauseBtn{background:#f9a825;color:#111}
  #stopBtn{background:#b71c1c;color:#fff}
  #dlBtn,#testBtn{background:#333;color:#eee;font-size:14px;padding:10px}
  #status{margin:10px 0;font-size:13px;color:#9e9e9e;white-space:pre-line}
  #interim{color:#80cbc4;font-style:italic;min-height:1.4em;font-size:15px}
  .msg{background:#1e1e1e;border-radius:10px;padding:10px;margin:8px 0}
  .fr{color:#9e9e9e;font-size:12px}
  .ru{font-size:16px;margin-top:4px}
  details{margin-bottom:10px}
  summary{cursor:pointer;color:#9e9e9e}
  label.chk{display:flex;gap:8px;align-items:center;font-size:14px;margin:8px 0;color:#ccc}
  label.chk input{width:auto;margin:0}
</style>
</head>
<body>
<h3>🎤 Переводчик FR → RU → Telegram</h3>

<details open id="setup">
  <summary>Настройки (сохраняются на телефоне)</summary>
  <select id="mode">
    <option value="realtime">🎯 OpenAI Realtime — лучшее качество, ~$2/час (нужен ключ)</option>
    <option value="free">🆓 Бесплатный — Web Speech + Google (качество хуже)</option>
  </select>
  <input id="oaKey" placeholder="OpenAI API key (sk-...) — обязателен для Realtime" autocomplete="off">
  <input id="tgToken" placeholder="Telegram bot token (123456:ABC...)" autocomplete="off">
  <input id="tgChat" placeholder="Telegram chat id (-100...)" autocomplete="off">
  <label class="chk"><input type="checkbox" id="sendVoice" checked> 🎙 Слать в Telegram ещё и голосом (voice-сообщения, только в Realtime)</label>
  <button id="testBtn">Проверить связь (пришлёт тест в телегу)</button>
</details>

<button id="startBtn">▶ Начать перевод</button>
<div id="runRow">
  <button id="pauseBtn">⏸ Пауза</button>
  <button id="stopBtn">■ Стоп</button>
</div>
<div id="status">Ожидание…</div>
<div id="interim"></div>
<div id="log"></div>
<button id="dlBtn">⬇ Скачать транскрипт</button>
<audio id="ttsOut" autoplay playsinline muted></audio>

<script>
const $ = id => document.getElementById(id);
const PRICE_PER_MIN = 0.034; // $ за минуту gpt-realtime-translate

["oaKey","tgToken","tgChat","mode"].forEach(f => {
  const el = $(f);
  const savedVal = localStorage.getItem(f);
  if(savedVal !== null) el.value = savedVal;
  el.addEventListener("input", () => localStorage.setItem(f, el.value.trim()));
  el.addEventListener("change", () => localStorage.setItem(f, el.value));
});
$("sendVoice").checked = localStorage.getItem("sendVoice") !== "0";
$("sendVoice").addEventListener("change", () =>
  localStorage.setItem("sendVoice", $("sendVoice").checked ? "1" : "0"));

let running = false, paused = false, rec = null, wakeLock = null;
let transcript = [];
let restartCount = 0;
let currentMode = "realtime";
let sessionStart = 0, activeMs = 0, costTimer = null;

function setStatus(t){ $("status").textContent = t; }
function activeSeconds(){
  return Math.floor((activeMs + (running && !paused ? Date.now() - sessionStart : 0)) / 1000);
}
function costStr(){
  const s = activeSeconds();
  const mm = String(Math.floor(s/60)).padStart(2,"0"), ss = String(s%60).padStart(2,"0");
  return `${mm}:${ss} · ≈$${(s/60*PRICE_PER_MIN).toFixed(2)}`;
}
function tickStatus(){
  if(!running || paused || currentMode !== "realtime") return;
  setStatus(`Слушаю (Realtime)… ${costStr()} · переподключений: ${restartCount}`);
}

async function requestLock(){
  try {
    wakeLock = await navigator.wakeLock.request("screen");
    // система сама снимает lock при сворачивании — обнуляем, чтобы можно было запросить заново
    wakeLock.addEventListener("release", () => { wakeLock = null; });
  } catch(e){}
}
let awakeHooked = false;
async function keepAwake(){
  await requestLock();
  if(awakeHooked) return;
  awakeHooked = true;
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && running && !wakeLock) requestLock();
  });
}

async function sendTG(text){
  for(let i=0;i<3;i++){
    try{
      const r = await fetch(`https://api.telegram.org/bot${$("tgToken").value.trim()}/sendMessage`,{
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({chat_id: $("tgChat").value.trim(), text})
      });
      if(r.status === 429){ await new Promise(s=>setTimeout(s,3000)); continue; }
      if(!r.ok) throw new Error("TG " + r.status);
      return true;
    }catch(e){ await new Promise(s=>setTimeout(s,1500)); }
  }
  return false;
}

// общая очередь отправки в TG, чтобы фразы уходили по порядку
const tgQueue = [];
let tgBusy = false;
async function pumpTG(){
  if(tgBusy || !tgQueue.length) return;
  tgBusy = true;
  const item = tgQueue.shift();
  if($("tgToken").value.trim() && $("tgChat").value.trim()){
    const ok = await sendTG(item.text);
    if(!ok && item.div) item.div.querySelector(".ru").textContent += "  ⚠️ не ушло в TG";
  }
  tgBusy = false;
  pumpTG();
}

function addMsg(fr, ru){
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `<div class="fr"></div><div class="ru"></div>`;
  div.querySelector(".fr").textContent = fr;
  div.querySelector(".ru").textContent = ru;
  $("log").prepend(div);
  return div;
}
function pushSegment(fr, ru){
  transcript.push({fr, ru});
  const div = addMsg(fr, ru);
  tgQueue.push({text: ru, div});
  pumpTG();
}

/* ---------- Голос перевода → Telegram voice ---------- */
// пишем переведённую озвучку кусками (детектор тишины) и шлём войсами
let vadTimer = null, vadRecorder = null, audioCtx = null, vadSrc = null;
let voiceAsDoc = false; // если TG не принял формат как voice — шлём файлом

async function sendVoiceTG(blob, mime){
  const token = $("tgToken").value.trim(), chat = $("tgChat").value.trim();
  if(!token || !chat) return;
  const ext = mime.includes("mp4") ? "m4a" : mime.includes("webm") ? "webm" : "ogg";
  const attempt = async (asDoc) => {
    const fd = new FormData();
    fd.append("chat_id", chat);
    // webm-opus пробуем отдать как voice.ogg — внутри тот же opus, TG обычно принимает
    fd.append(asDoc ? "document" : "voice",
      new File([blob], asDoc ? ("perevod." + ext) : ("voice." + (ext === "webm" ? "ogg" : ext)), {type: mime}));
    const r = await fetch(`https://api.telegram.org/bot${token}/${asDoc ? "sendDocument" : "sendVoice"}`,
      {method: "POST", body: fd});
    return r.ok;
  };
  try{
    if(!voiceAsDoc && await attempt(false)) return;
    voiceAsDoc = true;
    await attempt(true);
  }catch(e){}
}

function watchRemoteAudio(stream){
  stopVoiceWatch();
  if(!window.MediaRecorder) return;
  const mime = ["audio/ogg;codecs=opus","audio/mp4","audio/webm;codecs=opus"]
    .find(m => MediaRecorder.isTypeSupported(m));
  if(!mime) return;
  audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
  audioCtx.resume().catch(()=>{});
  vadSrc = audioCtx.createMediaStreamSource(stream);
  const an = audioCtx.createAnalyser();
  an.fftSize = 2048;
  vadSrc.connect(an);
  const buf = new Float32Array(an.fftSize);
  let silentMs = 0;
  vadTimer = setInterval(() => {
    if(!running || paused) return;
    an.getFloatTimeDomainData(buf);
    let rms = 0;
    for(let i = 0; i < buf.length; i++) rms += buf[i]*buf[i];
    rms = Math.sqrt(rms / buf.length);
    if(rms > 0.01){ // озвучка говорит
      silentMs = 0;
      if($("sendVoice").checked && !vadRecorder){
        vadRecorder = new MediaRecorder(stream, {mimeType: mime});
        const chunks = [];
        vadRecorder.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
        vadRecorder.onstop = () => {
          const b = new Blob(chunks, {type: mime});
          vadRecorder = null;
          if(b.size > 4000) sendVoiceTG(b, mime); // совсем короткие огрызки не шлём
        };
        vadRecorder.start();
      }
    } else {
      silentMs += 100;
      if(vadRecorder && silentMs >= 1000){
        try{ vadRecorder.stop(); }catch(e){ vadRecorder = null; }
      }
    }
  }, 100);
}
function stopVoiceWatch(){
  clearInterval(vadTimer); vadTimer = null;
  if(vadRecorder){ try{ vadRecorder.stop(); }catch(e){} vadRecorder = null; }
  if(vadSrc){ try{ vadSrc.disconnect(); }catch(e){} vadSrc = null; }
}

/* ---------- Realtime-режим: gpt-realtime-translate по WebRTC ---------- */
let pc = null, dc = null, mediaStream = null;
let refreshTimer = null, flushTimer = null;
let ruBuf = "", frBuf = "";
let restarting = false, failStreak = 0;

async function startRealtime(){
  const key = $("oaKey").value.trim();
  setStatus("Создаю Realtime-сессию…");
  const cs = await fetch("https://api.openai.com/v1/realtime/translations/client_secrets", {
    method: "POST",
    headers: { Authorization: "Bearer " + key, "Content-Type": "application/json" },
    body: JSON.stringify({ session: { model: "gpt-realtime-translate", audio: { output: { language: "ru" } } } })
  });
  if(!cs.ok) throw new Error("OpenAI " + cs.status + " — проверь ключ и баланс (нужен Tier 1+)");
  const secret = (await cs.json()).value;

  if(!mediaStream)
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });

  pc = new RTCPeerConnection();
  mediaStream.getAudioTracks().forEach(t => pc.addTrack(t, mediaStream));
  pc.ontrack = ({streams}) => {
    $("ttsOut").srcObject = streams[0]; // локально не звучит (muted), но держит поток живым
    watchRemoteAudio(streams[0]);       // отсюда пишем войсы для телеги
  };
  dc = pc.createDataChannel("oai-events");
  dc.onmessage = onRealtimeEvent;
  pc.onconnectionstatechange = () => {
    if(running && !paused && (pc.connectionState === "failed" || pc.connectionState === "disconnected")){
      setStatus("Связь оборвалась — переподключаюсь…");
      scheduleRestart();
    }
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  const sdp = await fetch("https://api.openai.com/v1/realtime/translations/calls", {
    method: "POST",
    headers: { Authorization: "Bearer " + secret, "Content-Type": "application/sdp" },
    body: offer.sdp
  });
  if(!sdp.ok) throw new Error("Не удалось установить соединение: " + sdp.status);
  await pc.setRemoteDescription({ type: "answer", sdp: await sdp.text() });

  failStreak = 0;
  // у realtime-сессий есть лимит длительности — плановый перезапуск раньше, чем нас отрежут
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(() => {
    if(running && !paused){ setStatus("Плановое обновление сессии…"); scheduleRestart(); }
  }, 25 * 60 * 1000);
}

function teardownRT(keepMic){
  clearTimeout(refreshTimer);
  flushSegment();
  stopVoiceWatch();
  try{ dc && dc.close(); }catch(e){}
  try{ pc && pc.close(); }catch(e){}
  dc = pc = null;
  if(!keepMic && mediaStream){ mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
}

function scheduleRestart(){
  if(restarting || !running || paused) return;
  restarting = true;
  teardownRT(true); // микрофон не отпускаем, чтобы не потерять разрешение
  restartCount++;
  const delay = Math.min(15000, 1000 * Math.pow(2, failStreak));
  setTimeout(async () => {
    restarting = false;
    if(!running || paused) return;
    try{ await startRealtime(); }
    catch(e){
      failStreak++;
      setStatus("Переподключение не удалось: " + e.message + " — пробую снова…");
      scheduleRestart();
    }
  }, delay);
}

function onRealtimeEvent({data}){
  let e;
  try{ e = JSON.parse(data); }catch(_){ return; }
  if(e.type === "session.output_transcript.delta" && e.delta){
    ruBuf += e.delta;
    $("interim").textContent = ruBuf;
    armFlush();
  } else if(e.type === "session.input_transcript.delta" && e.delta){
    frBuf += e.delta;
  } else if(e.type === "error"){
    setStatus("Ошибка API: " + (((e.error||{}).message) || JSON.stringify(e)).slice(0,140));
  }
}

// сегментация: пауза 1.8с = конец фразы; длинный монолог режем по концу предложения
function armFlush(){
  clearTimeout(flushTimer);
  if(ruBuf.length > 400 && /[.!?…]["»]?\s*$/.test(ruBuf)){ flushSegment(); return; }
  flushTimer = setTimeout(flushSegment, 1800);
}
function flushSegment(){
  clearTimeout(flushTimer);
  const ru = ruBuf.trim(), fr = frBuf.trim();
  ruBuf = ""; frBuf = "";
  $("interim").textContent = "";
  if(ru) pushSegment(fr, ru);
}

/* ---------- Бесплатный режим: Web Speech + перевод ---------- */
async function translateFR(text){
  const key = $("oaKey").value.trim();
  if(!key){  // неофициальный эндпоинт Google Translate
    const u = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=fr&tl=ru&dt=t&q=" + encodeURIComponent(text);
    const r = await fetch(u);
    if(!r.ok) throw new Error("GoogleTr " + r.status);
    const j = await r.json();
    return j[0].map(x => x[0]).join("").trim();
  }
  const r = await fetch("https://api.openai.com/v1/chat/completions", {
    method:"POST",
    headers:{ "Content-Type":"application/json",
              "Authorization":"Bearer " + key },
    body: JSON.stringify({
      model:"gpt-4o-mini", temperature:0.2,
      messages:[
        {role:"system", content:"Ты синхронный переводчик на свадьбе во Франции. Переведи фразу с французского на русский естественно и тепло. Выведи ТОЛЬКО перевод."},
        {role:"user", content:text}
      ]
    })
  });
  if(!r.ok) throw new Error("OpenAI " + r.status);
  const j = await r.json();
  return j.choices[0].message.content.trim();
}

const q = [];
let busy = false;
async function pumpFree(){
  if(busy || !q.length) return;
  busy = true;
  const fr = q.shift();
  try{
    const ru = await translateFR(fr);
    pushSegment(fr, ru);
  }catch(e){
    setStatus("Ошибка перевода: " + e.message + " (продолжаю слушать)");
  }
  busy = false;
  pumpFree();
}

function makeRec(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ alert("Этот браузер не умеет распознавание речи. Открой в Chrome на Android или выбери режим Realtime."); return null; }
  const r = new SR();
  r.lang = "fr-FR";
  r.continuous = true;
  r.interimResults = true;

  r.onresult = (e) => {
    let interim = "";
    for(let i = e.resultIndex; i < e.results.length; i++){
      const res = e.results[i];
      if(res.isFinal){
        const text = res[0].transcript.trim();
        if(text.length > 1){ q.push(text); pumpFree(); }
      } else interim += res[0].transcript;
    }
    $("interim").textContent = interim;
  };
  r.onend = () => {           // Chrome на Android периодически сам останавливается — перезапускаем
    if(running && !paused){
      restartCount++;
      setStatus(`Слушаю (бесплатный режим)… перезапусков: ${restartCount}`);
      try{ r.start(); }catch(e){ setTimeout(()=>{ try{r.start()}catch(_){} }, 500); }
    }
  };
  r.onerror = (e) => {
    if(e.error === "not-allowed"){
      setStatus("Нет доступа к микрофону! Разреши в настройках сайта.");
      running = false;
      showIdleButtons();
    }
    // остальные ошибки (no-speech, network) — onend сам перезапустит
  };
  return r;
}

/* ---------- Управление ---------- */
function showRunButtons(){
  $("startBtn").style.display = "none";
  $("runRow").style.display = "flex";
}
function showIdleButtons(){
  $("startBtn").style.display = "block";
  $("runRow").style.display = "none";
  $("pauseBtn").textContent = "⏸ Пауза";
}

$("startBtn").onclick = async () => {
  currentMode = $("mode").value;
  if(currentMode === "realtime" && !$("oaKey").value.trim()){
    alert("Для Realtime нужен OpenAI API key. Впиши его или выбери бесплатный режим."); return;
  }
  if((!$("tgToken").value.trim() || !$("tgChat").value.trim()) &&
     !confirm("Telegram не настроен — перевод будет только на экране. Продолжить?")) return;

  running = true; paused = false;
  restartCount = 0; failStreak = 0;
  activeMs = 0; sessionStart = Date.now();
  await keepAwake();
  try{
    if(currentMode === "realtime"){
      await startRealtime();
      clearInterval(costTimer);
      costTimer = setInterval(tickStatus, 1000);
      tickStatus();
    } else {
      rec = makeRec();
      if(!rec){ running = false; return; }
      rec.start();
      setStatus("Слушаю (бесплатный режим)…");
    }
  }catch(e){
    running = false;
    setStatus("Не удалось запустить: " + e.message);
    return;
  }
  $("setup").open = false;
  showRunButtons();
};

$("pauseBtn").onclick = async () => {
  if(!running) return;
  if(!paused){
    paused = true;
    activeMs += Date.now() - sessionStart;
    if(currentMode === "realtime") teardownRT(true);
    else if(rec){ try{ rec.stop(); }catch(e){} }
    $("pauseBtn").textContent = "▶ Продолжить";
    setStatus(`Пауза — деньги не тратятся. Наслушано: ${costStr()}`);
  } else {
    sessionStart = Date.now();
    try{
      if(currentMode === "realtime"){ paused = false; await startRealtime(); tickStatus(); }
      else{
        paused = false;
        if(!rec) rec = makeRec();
        try{ rec.start(); }catch(e){}
        setStatus("Слушаю (бесплатный режим)…");
      }
    }catch(e){
      paused = true;
      setStatus("Не удалось продолжить: " + e.message + " — жми ▶ ещё раз");
      return;
    }
    $("pauseBtn").textContent = "⏸ Пауза";
  }
};

$("stopBtn").onclick = () => {
  if(running && !paused) activeMs += Date.now() - sessionStart;
  running = false; paused = false;
  clearInterval(costTimer);
  if(currentMode === "realtime") teardownRT(false);
  if(rec){ try{ rec.stop(); }catch(e){} rec = null; }
  if(wakeLock){ wakeLock.release(); wakeLock = null; }
  showIdleButtons();
  const s = Math.floor(activeMs/1000);
  setStatus(`Остановлено. Всего перевода: ${Math.floor(s/60)} мин${currentMode==="realtime" ? `, потрачено ≈$${(s/60*PRICE_PER_MIN).toFixed(2)}` : ""}.`);
};

$("testBtn").onclick = async () => {
  const ok = await sendTG("✅ Тест: переводчик подключён и готов");
  setStatus(ok ? "Тест ушёл в телегу ✅" : "Тест НЕ ушёл — проверь токен и chat_id ❌");
};

$("dlBtn").onclick = () => {
  const txt = transcript.map(t => `FR: ${t.fr}\nRU: ${t.ru}`).join("\n\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([txt], {type:"text/plain"}));
  a.download = "transcript.txt";
  a.click();
};
</script>
</body>
</html>
